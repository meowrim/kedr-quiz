<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Викторина — Кедровые орехи</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'IBM Plex Serif', serif;
        }
        .fullscreen-quiz {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow-y: auto;
        }
        .quiz-content {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            border-radius: 40px;
            padding: 30px;
            background: transparent;
        }
        .quiz-content img {
            width: 100%;
            border-radius: 32px;
            margin-bottom: 28px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.2);
        }
        .question {
            background: #4B935F;
            border-radius: 40px;
            padding: 22px 24px;
            color: white;
            font-weight: 700;
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.3;
        }
        .answers {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 30px;
        }
        .answer {
            display: flex;
            align-items: center;
            gap: 18px;
            background: white;
            border: 2px solid #4B935F;
            border-radius: 80px;
            padding: 16px 24px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .answer:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        .answer-num {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #4B935F;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.3rem;
            color: #4B935F;
            flex-shrink: 0;
            background: white;
        }
        .answer-text {
            font-size: 1.1rem;
            font-weight: 500;
            color: #1e2a32;
            line-height: 1.4;
        }
        .answer.selected {
            background: #C0F3BC;
            border-color: #3e7f54;
        }
        .result {
            margin-top: 24px;
            text-align: center;
        }
        .result-title {
            background: #4B935F;
            border-radius: 40px;
            padding: 20px;
            color: white;
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }
        .result-msg {
            background: white;
            border: 2px solid #4B935F;
            border-radius: 40px;
            padding: 20px;
            color: #1e2a32;
            font-size: 1.2rem;
            line-height: 1.4;
        }
        .hidden {
            display: none;
        }
        .status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 250;
            backdrop-filter: blur(6px);
            font-weight: 500;
        }
        @media (max-width: 600px) {
            .fullscreen-quiz {
                padding: 16px;
            }
            .quiz-content {
                padding: 20px;
            }
            .question {
                font-size: 1.2rem;
                padding: 18px;
                margin-bottom: 24px;
            }
            .answer {
                padding: 12px 18px;
                gap: 12px;
            }
            .answer-num {
                width: 36px;
                height: 36px;
                font-size: 1.1rem;
            }
            .answer-text {
                font-size: 0.95rem;
            }
            .result-title {
                font-size: 1.4rem;
                padding: 16px;
            }
            .result-msg {
                font-size: 1rem;
                padding: 16px;
            }
        }
        @media (min-width: 1200px) {
            .quiz-content {
                max-width: 1100px;
            }
            .question {
                font-size: 1.6rem;
            }
            .answer-text {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="status" id="statusMsg">🔍 Наведите камеру на маркер (kedr.png)</div>

    <div id="fullscreenQuiz" class="fullscreen-quiz">
        <div class="quiz-content">
            <img src="5407028049875768637.jpg" alt="Кедровые орехи">
            <div id="questionBlock" class="question">Почему кедровые орехи ценятся в рационе человека?</div>
            <div id="answersBlock" class="answers">
                <div class="answer" data-correct="true">
                    <div class="answer-num">1</div>
                    <div class="answer-text">Высокое содержание полезных жиров и витаминов</div>
                </div>
                <div class="answer" data-correct="false">
                    <div class="answer-num">2</div>
                    <div class="answer-text">Содержат много сахара</div>
                </div>
                <div class="answer" data-correct="false">
                    <div class="answer-num">3</div>
                    <div class="answer-text">Состоят в основном из воды</div>
                </div>
            </div>
            <div id="resultBlock" class="result hidden"></div>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; patternRatio: 0.55; detectionMode: mono_and_matrix; matrixCodeType: 3x3; maxDetectionRate: 30;">
        <a-marker type="pattern" url="kedr.patt"></a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const statusMsg = document.getElementById('statusMsg');
        const fullscreenQuiz = document.getElementById('fullscreenQuiz');
        const questionBlock = document.getElementById('questionBlock');
        const answersBlock = document.getElementById('answersBlock');
        const resultBlock = document.getElementById('resultBlock');
        let answered = false;

        function finishQuiz(isCorrect) {
            if (answered) return;
            answered = true;
            questionBlock.classList.add('hidden');
            answersBlock.classList.add('hidden');
            resultBlock.classList.remove('hidden');
            if (isCorrect) {
                resultBlock.innerHTML = `
                    <div class="result-title">Правильно!</div>
                    <div class="result-msg">Получите 100 монет.<br>Карточка используется сразу и возвращается в колоду.</div>
                `;
            } else {
                resultBlock.innerHTML = `
                    <div class="result-title">Не верно!</div>
                    <div class="result-msg">Попробуйте в следующий раз</div>
                `;
            }
        }

        document.querySelectorAll('.answer').forEach(btn => {
            btn.addEventListener('click', () => {
                if (answered) return;
                btn.classList.add('selected');
                const isCorrect = btn.getAttribute('data-correct') === 'true';
                setTimeout(() => finishQuiz(isCorrect), 200);
            });
        });

        const marker = document.querySelector('a-marker');
        if (marker) {
            marker.addEventListener('markerFound', () => {
                statusMsg.innerText = '✅ Маркер найден. Викторина на весь экран.';
                fullscreenQuiz.style.display = 'flex';
            });
            marker.addEventListener('markerLost', () => {
                statusMsg.innerText = '🔍 Маркер потерян. Наведите камеру снова.';
            });
        }
    </script>
</body>
</html>
