<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Викторина — кедровые орехи</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'IBM Plex Serif', serif;
        }
        .quiz-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 500px;
            background: white;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 100;
            display: none;
            border: 2px solid #4B935F;
        }
        .question-block {
            background-color: #4B935F;
            border-radius: 32px;
            padding: 16px;
            color: white;
            font-weight: 600;
            font-size: 1.3rem;
            margin-bottom: 20px;
        }
        .answer-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 12px;
            background-color: white;
            border: 2px solid #4B935F;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
        }
        .answer-number {
            width: 32px;
            height: 32px;
            background: white;
            border: 2px solid #4B935F;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #4B935F;
        }
        .answer-text {
            font-size: 1rem;
            font-weight: 500;
            text-align: left;
        }
        .answer-option.selected {
            background-color: #C0F3BC;
        }
        .result-block {
            margin-top: 20px;
            padding: 16px;
            border-radius: 32px;
            background-color: #4B935F;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            display: none;
        }
        .result-detail {
            background: white;
            border: 2px solid #4B935F;
            border-radius: 32px;
            padding: 16px;
            margin-top: 12px;
            color: #1e2a32;
            font-size: 1rem;
        }
        button {
            background: #4B935F;
            border: none;
            border-radius: 60px;
            padding: 10px 20px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            margin-top: 12px;
            cursor: pointer;
        }
        .info-marker {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px;
            font-size: 14px;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div id="quizOverlay" class="quiz-overlay">
        <div class="question-block" id="questionText">
            Почему кедровые орехи ценятся в рационе человека?
        </div>
        <div id="answersContainer">
            <div class="answer-option" data-correct="true">
                <div class="answer-number">1</div>
                <div class="answer-text">Высокое содержание полезных жиров и витаминов</div>
            </div>
            <div class="answer-option" data-correct="false">
                <div class="answer-number">2</div>
                <div class="answer-text">Содержат много сахара</div>
            </div>
            <div class="answer-option" data-correct="false">
                <div class="answer-number">3</div>
                <div class="answer-text">Состоят в основном из воды</div>
            </div>
        </div>
        <div id="resultBlock" class="result-block"></div>
        <div id="resultDetail" class="result-detail" style="display: none;"></div>
    </div>

    <div class="info-marker" id="markerStatus">🔍 Наведите камеру на маркер (изображение hiro)</div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        <a-marker preset="hiro">
            <a-entity position="0 0 0"></a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const quizOverlay = document.getElementById('quizOverlay');
        const answersContainer = document.getElementById('answersContainer');
        const resultBlock = document.getElementById('resultBlock');
        const resultDetail = document.getElementById('resultDetail');
        const markerStatus = document.getElementById('markerStatus');

        let answered = false;

        function showResult(isCorrect) {
            if (answered) return;
            answered = true;

            document.querySelectorAll('.answer-option').forEach(opt => {
                opt.style.pointerEvents = 'none';
            });

            if (isCorrect) {
                resultBlock.style.display = 'block';
                resultBlock.innerText = 'Правильно!';
                resultDetail.style.display = 'block';
                resultDetail.innerHTML = 'Получите 100 монет.<br>Карточка используется сразу и возвращается в колоду.';
            } else {
                resultBlock.style.display = 'block';
                resultBlock.innerText = 'Не верно!';
                resultDetail.style.display = 'block';
                resultDetail.innerHTML = 'Попробуйте в следующий раз';
            }
        }
        const answerOptions = document.querySelectorAll('.answer-option');
        answerOptions.forEach(opt => {
            opt.addEventListener('click', (e) => {
                if (answered) return;
                opt.classList.add('selected');
                const isCorrect = opt.getAttribute('data-correct') === 'true';
                setTimeout(() => {
                    showResult(isCorrect);
                }, 200);
            });
        });
        const marker = document.querySelector('a-marker');
        if (marker) {
            marker.addEventListener('markerFound', () => {
                markerStatus.innerText = '✅ Маркер найден! Викторина активирована.';
                quizOverlay.style.display = 'block';
            });
            marker.addEventListener('markerLost', () => {
                markerStatus.innerText = '🔍 Маркер потерян. Наведите камеру на маркер.';
                quizOverlay.style.display = 'none';
            });
        } else {
            console.warn("Маркер не найден");
        }
    </script>
</body>
</html>
