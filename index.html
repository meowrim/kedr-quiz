<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Викторина — Кедровые орехи</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'IBM Plex Serif', serif;
        }
        .ar-info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 200;
            pointer-events: none;
        }
        .quiz-panel {
            position: fixed;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            max-width: 85vw;
            background: white;
            border-radius: 32px;
            border: 2px solid #4B935F;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 20px 16px;
            z-index: 150;
            display: none;
            backdrop-filter: blur(2px);
            transition: all 0.2s ease;
        }
        .quiz-photo {
            width: 100%;
            border-radius: 24px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .quiz-photo img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 24px;
        }
        .question-block {
            background-color: #4B935F;
            border-radius: 28px;
            padding: 14px 16px;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 20px;
        }
        .answers-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .answer-option {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            border: 2px solid #4B935F;
            border-radius: 60px;
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .answer-number {
            width: 32px;
            height: 32px;
            background: white;
            border: 2px solid #4B935F;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: #4B935F;
            flex-shrink: 0;
        }
        .answer-text {
            font-size: 0.95rem;
            font-weight: 500;
            color: #1e2a32;
            line-height: 1.3;
        }
        .answer-option.selected {
            background-color: #C0F3BC;
        }
        .result-area {
            margin-top: 16px;
            text-align: center;
        }
        .result-title {
            background-color: #4B935F;
            border-radius: 28px;
            padding: 14px;
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 12px;
        }
        .result-message {
            background: white;
            border: 2px solid #4B935F;
            border-radius: 28px;
            padding: 14px;
            color: #1e2a32;
            font-size: 1rem;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 500px) {
            .quiz-panel {
                width: 260px;
                padding: 14px;
                right: 12px;
            }
            .question-block {
                font-size: 1rem;
                padding: 10px;
            }
            .answer-text {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="ar-info" id="markerStatus">🔍 Наведите камеру на маркер (Hiro)</div>

    <div id="quizPanel" class="quiz-panel">
        <div class="quiz-photo">
            <img src="5407028049875768637.jpg" alt="Кедровые орехи">
        </div>
        <div class="question-block" id="questionText">
            Почему кедровые орехи ценятся в рационе человека?
        </div>
        <div id="answersArea">
            <div class="answer-option" data-correct="true">
                <div class="answer-number">1</div>
                <div class="answer-text">Высокое содержание полезных жиров и витаминов</div>
            </div>
            <div class="answer-option" data-correct="false">
                <div class="answer-number">2</div>
                <div class="answer-text">Содержат много сахара</div>
            </div>
            <div class="answer-option" data-correct="false">
                <div class="answer-number">3</div>
                <div class="answer-text">Состоят в основном из воды</div>
            </div>
        </div>
        <div id="resultContainer" class="result-area hidden"></div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        <a-marker preset="hiro">
            <a-entity position="0 0 0"></a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const markerStatus = document.getElementById('markerStatus');
        const quizPanel = document.getElementById('quizPanel');
        const answersArea = document.getElementById('answersArea');
        const resultContainer = document.getElementById('resultContainer');
        let answered = false;

        function showResult(isCorrect) {
            if (answered) return;
            answered = true;
            answersArea.classList.add('hidden');
            resultContainer.classList.remove('hidden');
            if (isCorrect) {
                resultContainer.innerHTML = `
                    <div class="result-title">Правильно!</div>
                    <div class="result-message">Получите 100 монет.<br>Карточка используется сразу и возвращается в колоду.</div>
                `;
            } else {
                resultContainer.innerHTML = `
                    <div class="result-title">Не верно!</div>
                    <div class="result-message">Попробуйте в следующий раз</div>
                `;
            }
        }

        const answerOptions = document.querySelectorAll('.answer-option');
        answerOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                if (answered) return;
                opt.classList.add('selected');
                const isCorrect = opt.getAttribute('data-correct') === 'true';
                setTimeout(() => {
                    showResult(isCorrect);
                }, 200);
            });
        });

        const marker = document.querySelector('a-marker');
        if (marker) {
            marker.addEventListener('markerFound', () => {
                markerStatus.innerText = '✅ Маркер найден. Викторина справа активна.';
                quizPanel.style.display = 'block';
            });
            marker.addEventListener('markerLost', () => {
                markerStatus.innerText = '🔍 Маркер потерян. Наведите камеру на маркер.';
                quizPanel.style.display = 'none';
            });
        } else {
            markerStatus.innerText = '⚠️ Ошибка загрузки AR. Проверьте HTTPS.';
        }
    </script>
</body>
</html>
