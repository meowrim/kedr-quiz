<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Сувенирная лавка — AR Викторина</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'IBM Plex Serif', serif;
        }
        .status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 200;
            pointer-events: none;
        }
        .ar-panel {
            position: fixed;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            max-width: 85vw;
            max-height: 90vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            z-index: 150;
            display: none;
            background: transparent;
            scrollbar-width: thin;
        }
        .ar-panel::-webkit-scrollbar {
            width: 4px;
        }
        .ar-panel::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 4px;
        }
        .ar-panel::-webkit-scrollbar-thumb {
            background: #4B935F;
            border-radius: 4px;
        }
        .shop-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #4B935F;
            text-align: center;
            margin-bottom: 2px;
        }
        .nut-title {
            font-size: 1rem;
            font-weight: 600;
            color: #2c5a3a;
            text-align: center;
            border-bottom: 2px solid #C0F3BC;
            display: inline-block;
            width: auto;
            margin: 0 auto 8px auto;
            padding-bottom: 3px;
        }
        .title-wrapper {
            text-align: center;
        }
        .ar-panel img {
            width: 100%;
            border-radius: 20px;
            margin: 8px 0 12px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .question {
            background-color: #4B935F;
            border-radius: 24px;
            padding: 12px 14px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 16px;
        }
        .answers {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }
        .answer {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            border: 2px solid #4B935F;
            border-radius: 60px;
            padding: 8px 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .answer-num {
            width: 28px;
            height: 28px;
            background: white;
            border: 2px solid #4B935F;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: #4B935F;
            flex-shrink: 0;
        }
        .answer-text {
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e2a32;
            line-height: 1.3;
        }
        .answer.selected {
            background-color: #C0F3BC;
        }
        .result {
            margin-top: 12px;
            text-align: center;
        }
        .result-title {
            background-color: #4B935F;
            border-radius: 24px;
            padding: 12px;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        .result-msg {
            background: white;
            border: 2px solid #4B935F;
            border-radius: 24px;
            padding: 12px;
            color: #1e2a32;
            font-size: 0.85rem;
        }
        .hidden {
            display: none;
        }
        /* Мобильная адаптация: ещё компактнее */
        @media (max-width: 550px) {
            .ar-panel {
                width: 260px;
                right: 12px;
                max-height: 85vh;
            }
            .shop-title {
                font-size: 1.2rem;
            }
            .question {
                font-size: 0.9rem;
                padding: 10px;
                margin-bottom: 12px;
            }
            .answer {
                padding: 6px 12px;
            }
            .answer-text {
                font-size: 0.8rem;
            }
            .result-title {
                font-size: 1.1rem;
                padding: 10px;
            }
            .ar-panel img {
                margin: 4px 0 8px 0;
            }
        }
        @media (max-height: 700px) {
            .ar-panel {
                max-height: 85vh;
            }
            .question {
                margin-bottom: 8px;
                padding: 8px;
            }
            .answers {
                gap: 6px;
                margin-bottom: 8px;
            }
            .result {
                margin-top: 6px;
            }
            .ar-panel img {
                margin: 4px 0 6px 0;
            }
        }
    </style>
</head>
<body>
    <div class="status" id="statusMsg">🔍 Наведите камеру на маркер карточку действий</div>

    <div id="arPanel" class="ar-panel">
        <div class="shop-title">СУВЕНИРНАЯ ЛАВКА</div>
        <div class="title-wrapper">
            <div class="nut-title">Кедровые орехи</div>
        </div>
        <img src="5407028049875768637.jpg" alt="Кедровые орехи">
        <div id="questionBlock" class="question">Почему кедровые орехи ценятся в рационе человека?</div>
        <div id="answersBlock" class="answers">
            <div class="answer" data-correct="true">
                <div class="answer-num">1</div>
                <div class="answer-text">Высокое содержание полезных жиров и витаминов</div>
            </div>
            <div class="answer" data-correct="false">
                <div class="answer-num">2</div>
                <div class="answer-text">Содержат много сахара</div>
            </div>
            <div class="answer" data-correct="false">
                <div class="answer-num">3</div>
                <div class="answer-text">Состоят в основном из воды</div>
            </div>
        </div>
        <div id="resultBlock" class="result hidden"></div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; patternRatio: 0.55; detectionMode: mono_and_matrix; matrixCodeType: 3x3; maxDetectionRate: 30;">
        <a-marker type="pattern" url="kedr.patt"></a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const statusMsg = document.getElementById('statusMsg');
        const arPanel = document.getElementById('arPanel');
        const questionBlock = document.getElementById('questionBlock');
        const answersBlock = document.getElementById('answersBlock');
        const resultBlock = document.getElementById('resultBlock');
        let answered = false;

        function finishQuiz(isCorrect) {
            if (answered) return;
            answered = true;
            questionBlock.classList.add('hidden');
            answersBlock.classList.add('hidden');
            resultBlock.classList.remove('hidden');
            if (isCorrect) {
                resultBlock.innerHTML = `
                    <div class="result-title">Правильно!</div>
                    <div class="result-msg">Получите 100 монет.<br>Карточка используется сразу и возвращается в колоду.</div>
                `;
            } else {
                resultBlock.innerHTML = `
                    <div class="result-title">Не верно!</div>
                    <div class="result-msg">Попробуйте в следующий раз</div>
                `;
            }
        }

        document.querySelectorAll('.answer').forEach(btn => {
            btn.addEventListener('click', () => {
                if (answered) return;
                btn.classList.add('selected');
                const isCorrect = btn.getAttribute('data-correct') === 'true';
                setTimeout(() => finishQuiz(isCorrect), 200);
            });
        });

        const marker = document.querySelector('a-marker');
        if (marker) {
            marker.addEventListener('markerFound', () => {
                statusMsg.innerText = '✅ Маркер найден. Проходите викторину.';
                arPanel.style.display = 'block';
            });
            marker.addEventListener('markerLost', () => {
                statusMsg.innerText = '🔍 Маркер потерян. Наведите камеру на картчоку';
                arPanel.style.display = 'none';
            });
        }
    </script>
</body>
</html>
